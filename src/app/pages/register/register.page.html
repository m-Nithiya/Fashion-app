<ion-content class="register-content">

  <div class="register-container">

    <ion-card class="register-card">

      <ion-card-header>
        <div class="user-icon">
          <ion-icon name="person-circle-outline"></ion-icon>
        </div>

        <ion-card-title>Create Account</ion-card-title>
        <ion-card-subtitle>Join with us today</ion-card-subtitle>
      </ion-card-header>

      <ion-card-content>

        <!-- Full Name -->
        <ion-item lines="none" class="input-box">
          <ion-icon slot="start" name="person-outline"></ion-icon>
          <ion-input
            placeholder="Full Name"
            [(ngModel)]="fullName">
          </ion-input>
        </ion-item>

        <!-- Email -->
        <ion-item lines="none" class="input-box">
          <ion-icon slot="start" name="mail-outline"></ion-icon>
          <ion-input
            type="email"
            placeholder="Email"
            [(ngModel)]="email">
          </ion-input>
        </ion-item>

        <!-- Age -->
        <ion-item lines="none" class="input-box">
          <ion-icon slot="start" name="calendar-outline"></ion-icon>
          <ion-input
            type="number"
            placeholder="Age"
            [(ngModel)]="age">
          </ion-input>
        </ion-item>

        <!-- Password -->
        <ion-item lines="none" class="input-box">
          <ion-icon slot="start" name="lock-closed-outline"></ion-icon>
          <ion-input
            type="password"
            placeholder="Password"
            [(ngModel)]="password">
          </ion-input>
        </ion-item>

        <!-- Register Button -->
        <ion-button
          expand="block"
          class="register-btn"
          (click)="register()">
          CREATE ACCOUNT
        </ion-button>

        <div class="login-link">
          Already have an account?
          <a routerLink="/login">Sign In</a>
        </div>

      </ion-card-content>

    </ion-card>

  </div>

</ion-content>
