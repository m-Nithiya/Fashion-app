<ion-header>
  <ion-toolbar color="danger">
    <ion-title>My Wishlist</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div *ngIf="wishlistItems.length === 0" style="text-align:center; margin-top:50px;">
    <ion-icon name="heart-dislike-outline" style="font-size:60px; color:gray;"></ion-icon>
    <p>Ungaloda Wishlist empty ah irukku 💔</p>
  </div>

  <ion-grid *ngIf="wishlistItems.length > 0">
    <ion-row>
      <ion-col size="6" *ngFor="let item of wishlistItems">
        <ion-card>
          <img [src]="item.image" [alt]="item.name" />
          <ion-card-header>
            <ion-card-title style="font-size:14px;">{{ item.name }}</ion-card-title>
            <p>₹{{ item.price }}</p>
          </ion-card-header>

          <ion-button expand="block" fill="clear" color="danger" (click)="removeItem(item)">
            <ion-icon name="heart" slot="start"></ion-icon>
            Remove
          </ion-button>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
